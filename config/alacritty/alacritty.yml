background_opacity: 0.9
colors:
  bright:
    black: '0x5c6370'
    blue: '0x61afef'
    cyan: '0x56b6c2'
    green: '0x98c379'
    magenta: '0xc678dd'
    red: '0xe06c75'
    white: '0xe6efff'
    yellow: '0xd19a66'
  dim:
    black: '0x1e2127'
    blue: '0x61afef'
    cyan: '0x56b6c2'
    green: '0x98c379'
    magenta: '0xc678dd'
    red: '0xe06c75'
    white: '0x828791'
    yellow: '0xd19a66'
  normal:
    black: '0x1e2127'
    blue: '0x61afef'
    cyan: '0x56b6c2'
    green: '0x98c379'
    magenta: '0xc678dd'
    red: '0xe06c75'
    white: '0x828791'
    yellow: '0xd19a66'
  primary:
    background: '0x1e2127'
    bright_foreground: '0xe6efff'
    foreground: '0xabb2bf'
draw_bold_text_with_bright_colors: true
env:
  TERM: xterm-256color
font:
  bold:
    family: Source Code Pro
    style: Bold
  bold_italic:
    family: Mononoki Nerd Font
    style: Bold Italic
  italic:
    family: Source Code Pro
    style: Italic
  normal:
    family: Mononoki Nerd Font
    style: Regular
  offset:
    x: 0
    y: 1
  size: 9.0
key_bindings:
- action: Paste
  key: V
  mods: Control|Shift
- action: Copy
  key: C
  mods: Control|Shift
- action: PasteSelection
  key: Insert
  mods: Shift
- action: ResetFontSize
  key: Key0
  mods: Control
- action: IncreaseFontSize
  key: Equals
  mods: Control
- action: IncreaseFontSize
  key: Plus
  mods: Control
- action: DecreaseFontSize
  key: Minus
  mods: Control
- action: DecreaseFontSize
  key: Minus
  mods: Control
- action: ToggleFullscreen
  key: F11
  mods: None
- action: Paste
  key: Paste
  mods: None
- action: Copy
  key: Copy
  mods: None
- action: ClearLogNotice
  key: L
  mods: Control
- chars: "\f"
  key: L
  mods: Control
- action: ScrollPageUp
  key: PageUp
  mode: ~Alt
  mods: None
- action: ScrollPageDown
  key: PageDown
  mode: ~Alt
  mods: None
- action: ScrollToTop
  key: Home
  mode: ~Alt
  mods: Shift
- action: ScrollToBottom
  key: End
  mode: ~Alt
  mods: Shift
scrolling:
  history: 5000
window:
  class:
    general: Alacritty
    instance: Alacritty
  dynamic_padding: false
  padding:
    x: 6
    y: 6
  title: Alacritty
